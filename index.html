<!-- ── アプリ本体 ──────────────────────────────────────────────────────── -->
<script type="text/babel" data-presets="react">
"use strict";
const { useState, useEffect, useCallback, useRef } = React;
const { LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid } = Recharts;

// ── localStorage ラッパー（window.storage の代替）─────────────────────────
const storage = {
  get(key) {
    const v = localStorage.getItem(key);
    if (v === null) return Promise.reject(new Error("not found"));
    return Promise.resolve({ key, value: v });
  },
  set(key, value) {
    try { localStorage.setItem(key, value); } catch(_) {}
    return Promise.resolve({ key, value });
  }
};

// ── SVG アイコン（lucide-react の代替）────────────────────────────────────
const Ic = ({ size=24, color="currentColor", children }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
    stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    {children}
  </svg>
);
const Home        = ({size,color}) => <Ic size={size} color={color}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></Ic>;
const Calendar    = ({size,color}) => <Ic size={size} color={color}><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></Ic>;
const BarChart2   = ({size,color}) => <Ic size={size} color={color}><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></Ic>;
const Flame       = ({size,color}) => <Ic size={size} color={color}><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></Ic>;
const ChevronLeft = ({size,color}) => <Ic size={size} color={color}><polyline points="15 18 9 12 15 6"/></Ic>;
const ChevronRight= ({size,color}) => <Ic size={size} color={color}><polyline points="9 18 15 12 9 6"/></Ic>;
const Clock       = ({size,color}) => <Ic size={size} color={color}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Ic>;
const Smartphone  = ({size,color}) => <Ic size={size} color={color}><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></Ic>;
const Droplets    = ({size,color}) => <Ic size={size} color={color}><path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7.29 6.75 7 5.3c-.29 1.45-1.14 2.84-2.29 3.76S3 11.1 3 12.25c0 2.22 1.8 4.05 4 4.05z"/><path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97"/></Ic>;
const Shield      = ({size,color}) => <Ic size={size} color={color}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></Ic>;
const Sun         = ({size,color}) => <Ic size={size} color={color}><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></Ic>;
const Zap         = ({size,color}) => <Ic size={size} color={color}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></Ic>;
const CheckCircle = ({size,color}) => <Ic size={size} color={color}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></Ic>;
const Circle      = ({size,color}) => <Ic size={size} color={color}><circle cx="12" cy="12" r="10"/></Ic>;

// ── 定数 ──────────────────────────────────────────────────────────────────
const TODAY = new Date().toISOString().split("T")[0];
const A  = "#C42B2E";
const BG = "#0f0f0f";
const C1 = "#161616";
const C2 = "#1e1e1e";
const BD = "#2a2a2a";
const MU = "#585858";
const TX = "#e8e8e8";
const T2 = "#9a9a9a";

const EMPTY = {
  wakeTime:"", bedTime:"", sleepH:"", sleepM:"", sleepManual:false,
  coldShower:false, noPorn:false, morningText:"", morningMin:"",
  phoneH:"", phoneM:"",
};

// ── ユーティリティ ─────────────────────────────────────────────────────────
function autoSleep(wake, bed) {
  if (!wake || !bed) return null;
  const [wh,wm] = wake.split(":").map(Number);
  const [bh,bm] = bed.split(":").map(Number);
  let w=wh*60+wm, b=bh*60+bm;
  if (b >= w) b -= 1440;
  const d = w - b;
  if (d <= 0 || d > 1440) return null;
  return { h:Math.floor(d/60), m:d%60, total:d };
}
function sleepMins(day) {
  if (!day) return null;
  if (day.sleepManual && day.sleepH !== "")
    return (parseInt(day.sleepH)||0)*60 + (parseInt(day.sleepM)||0);
  const a = autoSleep(day.wakeTime, day.bedTime);
  if (a) return a.total;
  if (day.sleepH !== "") return (parseInt(day.sleepH)||0)*60 + (parseInt(day.sleepM)||0);
  return null;
}
function getPrevDateKey(dateStr) {
  const d = dateStr ? new Date(dateStr) : new Date();
  d.setDate(d.getDate()-1);
  return d.toISOString().split("T")[0];
}

// 表示用: 前日の就寝時刻 + 当日の起床時刻 を優先して睡眠時間を計算する
function sleepMinsForDisplay(day, allData, keyForDay) {
  if (!day) return null;
  if (day.sleepManual && day.sleepH !== "")
    return (parseInt(day.sleepH)||0)*60 + (parseInt(day.sleepM)||0);
  const key = keyForDay || TODAY;
  const prevKey = getPrevDateKey(key);
  const prev = allData ? allData[prevKey] : null;
  if (prev && prev.bedTime && day.wakeTime) {
    const a = autoSleep(day.wakeTime, prev.bedTime);
    if (a) return a.total;
  }
  // fallback: same-day計算（既存の振る舞い）
  return sleepMins(day);
}
function phoneMins(day) {
  if (!day) return null;
  if (day.phoneH !== "" || day.phoneM !== "")
    return (parseInt(day.phoneH)||0)*60 + (parseInt(day.phoneM)||0);
  return null;
}
function wakeMins(day) {
  if (!day || !day.wakeTime) return null;
  const [h,m] = day.wakeTime.split(":").map(Number);
  return h*60+m;
}
function score(day) {
  if (!day) return 0;
  return [!!day.wakeTime, sleepMins(day)!==null, !!day.coldShower,
          !!day.noPorn, !!day.morningText, phoneMins(day)!==null].filter(Boolean).length;
}
function calcStreak(allData) {
  let s = 0;
  for (let i=0; i<365; i++) {
    const d = new Date(); d.setDate(d.getDate()-i);
    if (score(allData[d.toISOString().split("T")[0]]) < 3) break;
    s++;
  }
  return s;
}
function heatColor(s) {
  if (!s) return C2;
  if (s <= 2) return "#4a1010";
  if (s <= 4) return "#851818";
  return A;
}
function fmtMins(m) {
  if (m === null || m === undefined) return "―";
  const h=Math.floor(m/60), r=m%60;
  return h ? (r ? `${h}h${r}m` : `${h}時間`) : `${r}分`;
}
function fmtWake(m) {
  if (m === null || m === undefined) return "―";
  return `${Math.floor(m/60)}:${String(m%60).padStart(2,"0")}`;
}

// ── 共通スタイル ───────────────────────────────────────────────────────────
const inp = {
  background:C2, border:`1px solid ${BD}`, borderRadius:8, color:TX,
  padding:"7px 10px", fontSize:14, outline:"none",
  fontFamily:"inherit", boxSizing:"border-box",
};
const navBtnStyle = {
  background:C1, border:`1px solid ${BD}`, borderRadius:10,
  padding:"8px 12px", cursor:"pointer", color:TX,
  display:"flex", alignItems:"center", justifyContent:"center",
  fontFamily:"inherit",
};

// ── 共通コンポーネント ─────────────────────────────────────────────────────
function Card({ children, style={} }) {
  return (
    <div style={{background:C1, border:`1px solid ${BD}`, borderRadius:16, padding:"14px 16px", ...style}}>
      {children}
    </div>
  );
}
function IconBox({ active, children }) {
  return (
    <div style={{background:active?"#200a0a":"#1a1a1a", borderRadius:10, padding:8,
      border:`1px solid ${active ? A+"55" : BD}`, transition:"all 0.25s", flexShrink:0}}>
      {children}
    </div>
  );
}
function CheckRow({ icon, label, sub, checked, onToggle }) {
  return (
    <div onClick={onToggle} style={{background:checked?"#1a0808":C1,
      border:`1px solid ${checked ? A+"65" : BD}`, borderRadius:16,
      padding:"14px 16px", cursor:"pointer", transition:"all 0.25s", userSelect:"none"}}>
      <div style={{display:"flex", alignItems:"center", justifyContent:"space-between"}}>
        <div style={{display:"flex", alignItems:"center", gap:12}}>
          <IconBox active={checked}>{icon}</IconBox>
          <div>
            <p style={{fontSize:14, fontWeight:600, color:TX, margin:0}}>{label}</p>
            <p style={{fontSize:11, color:MU, margin:0}}>{sub}</p>
          </div>
        </div>
        <div style={{transform:checked?"scale(1.15)":"scale(1)",
          transition:"transform 0.22s cubic-bezier(0.34,1.56,0.64,1)"}}>
          {checked ? <CheckCircle size={26} color={A}/> : <Circle size={26} color={BD}/>}
        </div>
      </div>
    </div>
  );
}
function SectionLabel({ children }) {
  return <p style={{fontSize:11, color:MU, margin:"0 0 10px", fontWeight:700,
    letterSpacing:1, textTransform:"uppercase"}}>{children}</p>;
}
function ChartTip({ active, payload, label, isWake }) {
  if (!active || !payload || !payload.length) return null;
  return (
    <div style={{background:"#1a1a1a", border:`1px solid ${BD}`, borderRadius:8, padding:"8px 12px"}}>
      <p style={{color:MU, fontSize:10, margin:"0 0 5px", fontWeight:600}}>{label}</p>
      {payload.map(p => (
        <p key={p.name} style={{color:p.color, fontSize:12, fontWeight:700, margin:"2px 0"}}>
          {p.name}: {p.value != null ? (isWake && p.name==="起床" ? fmtWake(p.value) : `${p.value}h`) : "―"}
        </p>
      ))}
    </div>
  );
}

// ── 今日の記録 ─────────────────────────────────────────────────────────────
function TodayView({ today, updateToday, allData, updatePrev }) {
  const sc = score(today);
  const st = calcStreak(allData);
  const prevKeyForToday = getPrevDateKey(TODAY);
  const prevRecForToday = allData ? allData[prevKeyForToday] : null;
  const as = (!today.sleepManual && prevRecForToday && prevRecForToday.bedTime)
    ? autoSleep(today.wakeTime, prevRecForToday.bedTime)
    : autoSleep(today.wakeTime, today.bedTime);
  const set = (k, v) => updateToday({ ...today, [k]: v });
  const setPrev = (k, v) => {
    const base = prevRecForToday ? {...prevRecForToday} : {};
    const upd = {...base, [k]: v};
    if (typeof updatePrev === "function") updatePrev(upd);
  };

  return (
    <div style={{paddingBottom:100, maxWidth:480, margin:"0 auto"}}>
      {/* ヘッダー */}
      <div style={{padding:"24px 16px 0", marginBottom:20}}>
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start"}}>
          <div>
            <p style={{fontSize:11, color:MU, letterSpacing:2, textTransform:"uppercase", margin:0}}>
              {new Date().toLocaleDateString("ja-JP",{year:"numeric",month:"long",day:"numeric",weekday:"short"})}
            </p>
            <h1 style={{fontSize:26, fontWeight:800, color:TX, margin:"3px 0 0", letterSpacing:-1}}>今日の記録</h1>
          </div>
          {st > 0 && (
            <div style={{background:"#180808", border:`1px solid ${A}55`, borderRadius:14,
              padding:"10px 14px", textAlign:"center"}}>
              <div style={{display:"flex", alignItems:"center", gap:5}}>
                <Flame size={15} color={A}/>
                <span style={{color:A, fontWeight:900, fontSize:22, lineHeight:1}}>{st}</span>
              </div>
              <p style={{color:MU, fontSize:9, margin:"2px 0 0", letterSpacing:1}}>日連続</p>
            </div>
          )}
        </div>
        {/* 進捗バー */}
        <div style={{marginTop:16}}>
          <div style={{background:"#1e1e1e", borderRadius:99, height:5, overflow:"hidden"}}>
            <div style={{background:`linear-gradient(90deg,${A},#e04040)`, height:"100%",
              width:`${(sc/6)*100}%`, borderRadius:99,
              transition:"width 0.5s cubic-bezier(0.4,0,0.2,1)"}}/>
          </div>
          <p style={{color:MU, fontSize:11, marginTop:5}}>
            <span style={{color:sc>=6?A:T2, fontWeight:800}}>{sc}</span>
            <span style={{color:MU}}> / 6 達成</span>
            {sc >= 6 && <span style={{color:A, marginLeft:6}}>✦ 完璧</span>}
          </p>
        </div>
      </div>

      <div style={{padding:"0 16px", display:"flex", flexDirection:"column", gap:10}}>

        {/* Morning Log - 今日朝の記録 */}
        <SectionLabel>Today Morning Log</SectionLabel>
        <Card>
          <div style={{display:"flex", flexDirection:"column", gap:10}}>
            <div style={{display:"flex", alignItems:"center", justifyContent:"space-between"}}>
              <div style={{display:"flex", alignItems:"center", gap:12}}>
                <IconBox active={!!today.wakeTime}><Sun size={18} color={today.wakeTime?A:MU}/></IconBox>
                <div>
                  <p style={{fontSize:14, fontWeight:600, color:TX, margin:0}}>起床時間</p>
                  <p style={{fontSize:11, color:MU, margin:0}}>何時に起きた？</p>
                </div>
              </div>
              <input type="time" value={today.wakeTime}
                onChange={e => set("wakeTime", e.target.value)}
                style={{...inp, fontWeight:700, fontSize:15}}/>
            </div>

            <div>
              <p style={{fontSize:14, fontWeight:600, color:TX, margin:0}}>睡眠時間（FitBitから手入力）</p>
              <div style={{display:"flex", gap:8, marginTop:8, alignItems:"center"}}>
                <input type="number" placeholder="h" min="0" max="24"
                  value={today.sleepH}
                  onChange={e => updateToday({...today, sleepH:e.target.value, sleepManual:true})}
                  style={{...inp, width:80, textAlign:"center"}}/>
                <span style={{color:MU}}>時間</span>
                <input type="number" placeholder="m" min="0" max="59"
                  value={today.sleepM}
                  onChange={e => updateToday({...today, sleepM:e.target.value, sleepManual:true})}
                  style={{...inp, width:80, textAlign:"center"}}/>
                <span style={{color:MU}}>分</span>
              </div>
            </div>

            <CheckRow icon={<Droplets size={18} color={today.coldShower?A:MU}/>} 
              label="水シャワー" sub="冷水で浴びた"
              checked={today.coldShower}
              onToggle={() => updateToday({...today, coldShower:!today.coldShower})}/>

            <div>
              <p style={{fontSize:14, fontWeight:600, color:TX, margin:0}}>朝活</p>
              <input type="text" placeholder="例：読書、ジム、瞑想..."
                value={today.morningText}
                onChange={e => set("morningText", e.target.value)}
                style={{...inp, width:"100%", marginTop:8}}/>
              <div style={{display:"flex", alignItems:"center", gap:8, marginTop:8}}>
                <input type="number" placeholder="30" min="0"
                  value={today.morningMin}
                  onChange={e => set("morningMin", e.target.value)}
                  style={{...inp, width:70}}/>
                <span style={{fontSize:12, color:MU}}>分</span>
              </div>
            </div>
          </div>
        </Card>

        {/* Previous Day Log - 前日の記録（スクリーンタイム・No Porn） */}
        <SectionLabel>前日のLog</SectionLabel>
        <Card>
          <div style={{display:"flex", flexDirection:"column", gap:10}}>
            <div style={{display:"flex", alignItems:"center", justifyContent:"space-between"}}>
              <div style={{display:"flex", alignItems:"center", gap:12}}>
                <IconBox active={prevRecForToday && phoneMins(prevRecForToday)!==null}>
                  <Smartphone size={18} color={prevRecForToday && phoneMins(prevRecForToday)!==null?A:MU}/>
                </IconBox>
                <div>
                  <p style={{fontSize:14, fontWeight:600, color:TX, margin:0}}>スクリーンタイム</p>
                  <p style={{fontSize:11, color:MU, margin:0}}>前日の合計</p>
                </div>
              </div>
              <div style={{display:"flex", alignItems:"center", gap:6}}>
                <input type="number" placeholder="h" min="0" max="24"
                  value={prevRecForToday?prevRecForToday.phoneH:""}
                  onChange={e => setPrev("phoneH", e.target.value)}
                  style={{...inp, width:60, textAlign:"center"}}/>
                <span style={{color:MU, fontSize:12}}>h</span>
                <input type="number" placeholder="m" min="0" max="59"
                  value={prevRecForToday?prevRecForToday.phoneM:""}
                  onChange={e => setPrev("phoneM", e.target.value)}
                  style={{...inp, width:60, textAlign:"center"}}/>
                <span style={{color:MU, fontSize:12}}>m</span>
              </div>
            </div>

            <div style={{display:"flex", alignItems:"center", justifyContent:"space-between"}}>
              <div style={{display:"flex", alignItems:"center", gap:12}}>
                <IconBox active={prevRecForToday && prevRecForToday.noPorn}>
                  <Shield size={18} color={prevRecForToday && prevRecForToday.noPorn?A:MU}/>
                </IconBox>
                <div>
                  <p style={{fontSize:14, fontWeight:600, color:TX, margin:0}}>No Porn</p>
                  <p style={{fontSize:11, color:MU, margin:0}}>前日の自制</p>
                </div>
              </div>
              <div>
                <button onClick={() => setPrev("noPorn", !(prevRecForToday&&prevRecForToday.noPorn))}
                  style={{...navBtnStyle, padding:"8px 12px"}}>
                  {prevRecForToday && prevRecForToday.noPorn ? "✓ 保存" : "✗ 未"}
                </button>
              </div>
            </div>
          </div>
        </Card>
      </div>
    </div>
  );
}

// ── カレンダー ─────────────────────────────────────────────────────────────
function CalendarView({ allData }) {
  const now = new Date();
  const [yr, setYr] = useState(now.getFullYear());
  const [mo, setMo] = useState(now.getMonth());
  const [sel, setSel] = useState(null);

  const first = new Date(yr, mo, 1).getDay();
  const dim   = new Date(yr, mo+1, 0).getDate();
  const mName = new Date(yr, mo).toLocaleDateString("ja-JP",{year:"numeric",month:"long"});

  const days = Array.from({length:dim}, (_,i) => {
    const d = i+1;
    const key = `${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const data = allData[key];
    return { d, key, sc:score(data), data };
  });

  const prev = () => { if(mo===0){setYr(y=>y-1);setMo(11);}else setMo(m=>m-1); };
  const next = () => { if(mo===11){setYr(y=>y+1);setMo(0);}else setMo(m=>m+1); };
  const selDay = sel ? days.find(d => d.key===sel) : null;

  return (
    <div style={{padding:"24px 16px 100px", maxWidth:480, margin:"0 auto"}}>
      <h1 style={{fontSize:24, fontWeight:800, color:TX, margin:"0 0 20px", letterSpacing:-0.5}}>カレンダー</h1>

      <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16}}>
        <button onClick={prev} style={navBtnStyle}><ChevronLeft size={18}/></button>
        <span style={{fontWeight:700, color:TX, fontSize:16}}>{mName}</span>
        <button onClick={next} style={navBtnStyle}><ChevronRight size={18}/></button>
      </div>

      <div style={{display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:4, marginBottom:6}}>
        {["日","月","火","水","木","金","土"].map(w => (
          <div key={w} style={{textAlign:"center", fontSize:11, color:MU, fontWeight:600}}>{w}</div>
        ))}
      </div>

      <div style={{display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:4}}>
        {Array.from({length:first}, (_,i) => <div key={`e${i}`}/>)}
        {days.map(({d, key, sc}) => {
          const isToday = key===TODAY, isSel = key===sel;
          return (
            <div key={d} onClick={() => setSel(isSel?null:key)}
              style={{aspectRatio:"1", borderRadius:10,
                background:isSel?A:heatColor(sc),
                border:isToday?`2px solid ${A}`:`1px solid ${BD}`,
                display:"flex", flexDirection:"column",
                alignItems:"center", justifyContent:"center",
                cursor:"pointer", transition:"all 0.15s"}}>
              <span style={{fontSize:13, fontWeight:isToday?800:500,
                color:sc>0||isSel?"#fff":T2}}>{d}</span>
              {sc>0 && !isSel && (
                <div style={{display:"flex", gap:1, marginTop:2}}>
                  {Array.from({length:Math.min(sc,6)}, (_,i) => (
                    <div key={i} style={{width:3, height:3, borderRadius:99,
                      background:"rgba(255,255,255,0.45)"}}/>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div style={{display:"flex", alignItems:"center", gap:10, marginTop:16, justifyContent:"center"}}>
        <span style={{fontSize:11, color:MU}}>達成度:</span>
        {[0,2,4,6].map(s => (
          <div key={s} style={{display:"flex", alignItems:"center", gap:4}}>
            <div style={{width:14, height:14, borderRadius:4,
              background:heatColor(s), border:`1px solid ${BD}`}}/>
            <span style={{fontSize:10, color:MU}}>{s===0?"なし":`${s}/6`}</span>
          </div>
        ))}
      </div>

      {selDay && (
        <div style={{marginTop:16, background:C1, border:`1px solid ${BD}`,
          borderRadius:16, padding:"14px 16px"}}>
          <p style={{fontWeight:700, color:TX, margin:"0 0 12px", fontSize:14}}>
            {sel} の記録
            <span style={{marginLeft:8, fontSize:12, color:selDay.sc>=4?A:MU}}>
              {selDay.sc}/6 達成
            </span>
          </p>
          {selDay.data ? (
            <div style={{display:"flex", flexDirection:"column", gap:7}}>
              {[
                {label:"起床",val:selDay.data.wakeTime||"―"},
                {label:"睡眠",val:fmtMins(sleepMins(selDay.data))},
                {label:"水シャワー",val:selDay.data.coldShower?"✓":"✗",ok:selDay.data.coldShower},
                {label:"ポルノなし",val:selDay.data.noPorn?"✓":"✗",ok:selDay.data.noPorn},
                {label:"朝活",val:selDay.data.morningText||"―"},
                {label:"スマホ",val:fmtMins(phoneMins(selDay.data))},
              ].map(({label,val,ok}) => (
                <div key={label} style={{display:"flex", justifyContent:"space-between", fontSize:13}}>
                  <span style={{color:MU}}>{label}</span>
                  <span style={{color:ok!==undefined?(ok?A:T2):TX, fontWeight:600}}>{val}</span>
                </div>
              ))}
            </div>
          ) : <p style={{color:MU, fontSize:13, margin:0}}>データなし</p>}
        </div>
      )}
    </div>
  );
}

// ── 統計 ───────────────────────────────────────────────────────────────────
function AchBar({ label, val, max }) {
  return (
    <div style={{marginBottom:12}}>
      <div style={{display:"flex", justifyContent:"space-between", marginBottom:5}}>
        <span style={{fontSize:12, color:T2}}>{label}</span>
        <span style={{fontSize:12, color:TX, fontWeight:700}}>{val}/{max}日</span>
      </div>
      <div style={{background:"#222", borderRadius:99, height:6, overflow:"hidden"}}>
        <div style={{background:A, height:"100%", width:`${(val/max)*100}%`,
          borderRadius:99, transition:"width 0.5s ease"}}/>
      </div>
    </div>
  );
}

function MonthStat({ label, count, dim, streak }) {
  const pct = dim ? Math.round((count/dim)*100) : 0;
  return (
    <div style={{background:C1, border:`1px solid ${BD}`, borderRadius:14,
      padding:"12px 8px", textAlign:"center"}}>
      <p style={{fontSize:24, fontWeight:900, color:count>0?A:MU, margin:0, lineHeight:1}}>{count}</p>
      <p style={{fontSize:9, color:MU, margin:"3px 0 4px"}}>/{dim}日 ({pct}%)</p>
      <p style={{fontSize:10, color:T2, fontWeight:600, margin:"0 0 3px"}}>{label}</p>
      <div style={{display:"flex", alignItems:"center", gap:3, justifyContent:"center"}}>
        <Flame size={10} color={streak>0?A:MU}/>
        <span style={{fontSize:9, color:streak>0?A:MU}}>最長{streak}日</span>
      </div>
    </div>
  );
}

function StatsView({ allData }) {
  const [period, setPeriod] = useState("weekly");
  const now = new Date();
  const [sYr, setSYr] = useState(now.getFullYear());
  const [sMo, setSMo] = useState(now.getMonth());

  const wData = Array.from({length:7}, (_,i) => {
    const d = new Date(); d.setDate(d.getDate()-6+i);
    const key = d.toISOString().split("T")[0];
    const day = allData[key];
    const sm = day ? sleepMins(day) : null;
    const pm = day ? phoneMins(day) : null;
    return {
      label: d.toLocaleDateString("ja-JP",{weekday:"short"}),
      sleep: sm!==null ? +(sm/60).toFixed(1) : null,
      phone: pm!==null ? +(pm/60).toFixed(1) : null,
      wake:  wakeMins(day),
      cold:  day && day.coldShower ? 1 : 0,
      porn:  day && day.noPorn ? 1 : 0,
      morn:  day && day.morningText ? 1 : 0,
    };
  });

  const dim = new Date(sYr, sMo+1, 0).getDate();
  const mDays = Array.from({length:dim}, (_,i) => {
    const key = `${sYr}-${String(sMo+1).padStart(2,"0")}-${String(i+1).padStart(2,"0")}`;
    return allData[key];
  });

  function bestStreak(fn) {
    let best=0, cur=0;
    mDays.forEach(d => { if(fn(d)){cur++;best=Math.max(best,cur);}else cur=0; });
    return best;
  }

  const mLineData = Array.from({length:dim}, (_,i) => {
    const key = `${sYr}-${String(sMo+1).padStart(2,"0")}-${String(i+1).padStart(2,"0")}`;
    const day = allData[key];
    const sm = day ? sleepMins(day) : null;
    const pm = day ? phoneMins(day) : null;
    return {
      d: String(i+1),
      sleep: sm!==null ? +(sm/60).toFixed(1) : null,
      phone: pm!==null ? +(pm/60).toFixed(1) : null,
    };
  });

  const mStats = {
    cold: mDays.filter(d => d && d.coldShower).length,
    porn: mDays.filter(d => d && d.noPorn).length,
    morn: mDays.filter(d => d && d.morningText).length,
    coldStr: bestStreak(d => d && d.coldShower),
    pornStr: bestStreak(d => d && d.noPorn),
    mornStr: bestStreak(d => d && d.morningText),
    avgSleep: (() => {
      const v=mDays.map(d=>sleepMins(d)).filter(v=>v!==null);
      return v.length ? +(v.reduce((a,b)=>a+b)/v.length/60).toFixed(1) : null;
    })(),
    avgPhone: (() => {
      const v=mDays.map(d=>phoneMins(d)).filter(v=>v!==null);
      return v.length ? +(v.reduce((a,b)=>a+b)/v.length/60).toFixed(1) : null;
    })(),
    avgWake: (() => {
      const v=mDays.map(d=>wakeMins(d)).filter(v=>v!==null);
      return v.length ? fmtWake(Math.round(v.reduce((a,b)=>a+b)/v.length)) : null;
    })(),
  };

  const mnName = new Date(sYr,sMo).toLocaleDateString("ja-JP",{year:"numeric",month:"long"});
  const prevMo = () => { if(sMo===0){setSYr(y=>y-1);setSMo(11);}else setSMo(m=>m-1); };
  const nextMo = () => { if(sMo===11){setSYr(y=>y+1);setSMo(0);}else setSMo(m=>m+1); };

  return (
    <div style={{padding:"24px 16px 100px", maxWidth:480, margin:"0 auto"}}>
      <h1 style={{fontSize:24, fontWeight:800, color:TX, margin:"0 0 16px", letterSpacing:-0.5}}>統計</h1>

      <div style={{display:"flex", gap:8, marginBottom:20}}>
        {[["weekly","週次"],["monthly","月次"]].map(([p,l]) => (
          <button key={p} onClick={() => setPeriod(p)} style={{
            flex:1, padding:"8px 0", borderRadius:10, border:"none", cursor:"pointer",
            fontWeight:700, fontSize:13, fontFamily:"inherit",
            background:period===p?A:C1, color:period===p?"#fff":MU, transition:"all 0.2s",
          }}>{l}</button>
        ))}
      </div>

      {period==="weekly" && (
        <div style={{display:"flex", flexDirection:"column", gap:14}}>
          <Card>
            <SectionLabel>睡眠・スマホ（h）— 過去7日</SectionLabel>
            <ResponsiveContainer width="100%" height={150}>
              <LineChart data={wData} margin={{top:4,right:4,bottom:0,left:-22}}>
                <CartesianGrid strokeDasharray="3 3" stroke="#222"/>
                <XAxis dataKey="label" tick={{fill:MU,fontSize:11}}/>
                <YAxis tick={{fill:MU,fontSize:10}}/>
                <Tooltip content={<ChartTip/>}/>
                <Line type="monotone" dataKey="sleep" name="睡眠" stroke="#5588ff"
                  strokeWidth={2} dot={{r:3,fill:"#5588ff"}} connectNulls/>
                <Line type="monotone" dataKey="phone" name="スマホ" stroke={A}
                  strokeWidth={2} dot={{r:3,fill:A}} connectNulls/>
              </LineChart>
            </ResponsiveContainer>
          </Card>

          <Card>
            <SectionLabel>起床時刻 — 過去7日</SectionLabel>
            <ResponsiveContainer width="100%" height={120}>
              <LineChart data={wData} margin={{top:4,right:4,bottom:0,left:-8}}>
                <CartesianGrid strokeDasharray="3 3" stroke="#222"/>
                <XAxis dataKey="label" tick={{fill:MU,fontSize:11}}/>
                <YAxis tick={{fill:MU,fontSize:9}} tickFormatter={fmtWake}
                  domain={["dataMin - 30","dataMax + 30"]}/>
                <Tooltip content={<ChartTip isWake/>}/>
                <Line type="monotone" dataKey="wake" name="起床" stroke="#f0a030"
                  strokeWidth={2} dot={{r:3,fill:"#f0a030"}} connectNulls/>
              </LineChart>
            </ResponsiveContainer>
          </Card>

          <Card>
            <SectionLabel>習慣達成 — 過去7日</SectionLabel>
            <AchBar label="水シャワー" val={wData.filter(d=>d.cold).length} max={7}/>
            <AchBar label="ポルノなし" val={wData.filter(d=>d.porn).length} max={7}/>
            <AchBar label="朝活"       val={wData.filter(d=>d.morn).length} max={7}/>
          </Card>
        </div>
      )}

      {period==="monthly" && (
        <div style={{display:"flex", flexDirection:"column", gap:14}}>
          <div style={{display:"flex", alignItems:"center", justifyContent:"space-between"}}>
            <button onClick={prevMo} style={navBtnStyle}><ChevronLeft size={16}/></button>
            <span style={{fontWeight:700, color:TX, fontSize:15}}>{mnName}</span>
            <button onClick={nextMo} style={navBtnStyle}><ChevronRight size={16}/></button>
          </div>

          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8}}>
            <MonthStat label="水シャワー" count={mStats.cold} dim={dim} streak={mStats.coldStr}/>
            <MonthStat label="ポルノなし" count={mStats.porn} dim={dim} streak={mStats.pornStr}/>
            <MonthStat label="朝活"       count={mStats.morn} dim={dim} streak={mStats.mornStr}/>
          </div>

          <Card>
            <SectionLabel>月間平均</SectionLabel>
            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8}}>
              {[
                {l:"平均起床",  v: mStats.avgWake  || "―"},
                {l:"平均睡眠",  v: mStats.avgSleep  != null ? `${mStats.avgSleep}h`  : "―"},
                {l:"スマホ平均",v: mStats.avgPhone  != null ? `${mStats.avgPhone}h`  : "―"},
              ].map(({l,v}) => (
                <div key={l} style={{textAlign:"center"}}>
                  <p style={{fontSize:20, fontWeight:800, color:TX, margin:0}}>{v}</p>
                  <p style={{fontSize:10, color:MU, margin:"3px 0 0"}}>{l}</p>
                </div>
              ))}
            </div>
          </Card>

          <Card>
            <SectionLabel>睡眠・スマホ推移（h）</SectionLabel>
            <ResponsiveContainer width="100%" height={140}>
              <LineChart data={mLineData} margin={{top:4,right:4,bottom:0,left:-22}}>
                <CartesianGrid strokeDasharray="3 3" stroke="#222"/>
                <XAxis dataKey="d" tick={{fill:MU,fontSize:9}}
                  interval={Math.max(1,Math.floor(dim/6))}/>
                <YAxis tick={{fill:MU,fontSize:9}}/>
                <Tooltip content={<ChartTip/>}/>
                <Line type="monotone" dataKey="sleep" name="睡眠" stroke="#5588ff"
                  strokeWidth={2} dot={false} connectNulls/>
                <Line type="monotone" dataKey="phone" name="スマホ" stroke={A}
                  strokeWidth={2} dot={false} connectNulls/>
              </LineChart>
            </ResponsiveContainer>
          </Card>
        </div>
      )}
    </div>
  );
}

// ── ボトムナビ ─────────────────────────────────────────────────────────────

  return (
    <div style={{position:"fixed", bottom:0, left:0, right:0, background:BG,
      borderTop:`1px solid ${BD}`, display:"flex", padding:"10px 0 20px", zIndex:100}}>
      {[
        {k:"today",    icon:Home,      l:"今日"},
        {k:"calendar", icon:Calendar,  l:"カレンダー"},
        {k:"stats",    icon:BarChart2, l:"統計"},
      ].map(({k, icon:Icon, l}) => (
        <button key={k} onClick={() => setView(k)} style={{
          flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:4,
          background:"none", border:"none", cursor:"pointer",
          color:view===k?A:MU, transition:"color 0.2s", fontFamily:"inherit",
        }}>
          <Icon size={22} color={view===k?A:MU}/>

}

// ── メイン ─────────────────────────────────────────────────────────────────
function HabitTracker() {
  const [view,     setView]     = useState("today");
  const [allData,  setAllData]  = useState({});
  const [today,    setToday]    = useState({...EMPTY});
  const [loading,  setLoading]  = useState(true);
  const allRef = useRef({});

  useEffect(() => {
    // Google Fonts
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap";
    document.head.appendChild(link);

    // データ読み込み
    (async () => {
      try {
        const r = await storage.get("habit-v1");
        const data = JSON.parse(r.value);
        allRef.current = data;
        setAllData(data);
        setToday(data[TODAY] ? {...EMPTY, ...data[TODAY]} : {...EMPTY});
      } catch(_) { /* 初回 */ }
      setLoading(false);
    })();
  }, []);

  const updateToday = useCallback(async (newDay) => {
    setToday(newDay);

    // 保存時: 就寝時刻が前日に属する場合は前日のレコードへ移動する
    const newAllBase = {...allRef.current};
    let dayToSave = {...newDay};
    try {
      const parse = t => { if (!t) return null; const [h,m]=t.split(":").map(Number); return h*60 + (m||0); };
      const b = parse(newDay.bedTime);
      const w = parse(newDay.wakeTime);
      if (b !== null && w !== null && b >= w) {
        const prevKey = getPrevDateKey(TODAY);
        const prevRec = {...(newAllBase[prevKey] || {})};
        // 移動: 就寝時刻と手動睡眠値を前日へ保存
        prevRec.bedTime = newDay.bedTime;
        if (newDay.sleepManual) {
          prevRec.sleepManual = true;
          prevRec.sleepH = newDay.sleepH;
          prevRec.sleepM = newDay.sleepM;
        }
        newAllBase[prevKey] = prevRec;
        // 今日のレコードから就寝データを削除（前日の記録として分離）
        dayToSave = {...dayToSave, bedTime: "", sleepManual:false, sleepH:"", sleepM:""};
      }
    } catch(e) { /* ignore parsing errors */ }

    const newAll = {...newAllBase, [TODAY]: dayToSave};
    allRef.current = newAll;
    setAllData(newAll);
    try { await storage.set("habit-v1", JSON.stringify(newAll)); } catch(_) {}
  }, []);

  const updatePrev = useCallback(async (newPrev) => {
    const prevKey = getPrevDateKey(TODAY);
    const newAll = {...allRef.current, [prevKey]: newPrev};
    allRef.current = newAll;
    setAllData(newAll);
    try { await storage.set("habit-v1", JSON.stringify(newAll)); } catch(_) {}
  }, []);

  if (loading) return (
    <div style={{background:BG, minHeight:"100vh", display:"flex",
      alignItems:"center", justifyContent:"center"}}>
      <Flame size={36} color={A}/>
    </div>
  );

  return (
    <div style={{background:BG, minHeight:"100vh", color:TX,
      fontFamily:"'Syne', system-ui, sans-serif", overflowX:"hidden"}}>
      {view==="today"    && <TodayView    today={today} updateToday={updateToday} allData={allData} updatePrev={updatePrev}/>}
      {view==="calendar" && <CalendarView allData={allData}/>}
      {view==="stats"    && <StatsView    allData={allData}/>}
      <Nav view={view} setView={setView}/>
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById("root")).render(<HabitTracker/>);
} catch (e) {
  console.error(e);
  const r = document.getElementById("root");
  if (r) r.innerHTML = '<div style="color:#fff;padding:20px;max-width:480px;margin:24px auto;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;">アプリの読み込みに失敗しました。開発者ツールのコンソールに表示されるエラーを教えてください。</div>';
}
